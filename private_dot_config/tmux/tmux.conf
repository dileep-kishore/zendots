# Set the prefix key to C-a
unbind C-b
set -g prefix C-a

# Set the default terminal for new windows
set -g default-terminal "tmux-256color"

# Enable true color support (recommended)
set -ga terminal-overrides ",*256col*:Tc"

# Enable mouse support
set -g mouse on

# Use vi key bindings in copy mode
setw -g mode-keys vi

# Set window and pane base index to 1 (instead of 0)
set -g base-index 1
setw -g pane-base-index 1

# Use a 24-hour clock
setw -g clock-mode-style 24

set -ag terminal-overrides ",xterm-256color:RGB"
# undercurl support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
# underscore colours - needs tmux-3.0
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# reload config
bind r source-file ~/.config/tmux/tmux.conf

# allow passthrough
set-option -g allow-passthrough

# set default shell
set-option -g default-shell $SHELL

# status bar on top
set -g status-position top

# Set border colors
set -g pane-border-lines heavy

# Shift arrow to switch windows without wrapping
bind -n C-S-h if-shell -F '#{!=:#{window_start_flag},1}' 'previous-window' ''
bind -n C-S-l if-shell -F '#{!=:#{window_end_flag},1}' 'next-window' ''

# copy mode key binds
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
bind P paste-buffer
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"

# set title
set-option -g set-titles on
set-option -g set-titles-string '#S: #W - TMUX'

# binding to resize panes
bind -n M-Up resize-pane -U 5
bind -n M-Down resize-pane -D 5
bind -n M-Left resize-pane -L 5
bind -n M-Right resize-pane -R 5

# tmux sessions (with sesh)
bind-key "o" run-shell "~/.config/tmux/scripts/sesh-session-picker.py"

# other bindings
bind h split-window -v
bind v split-window -h

# theme and statusbar
thm_base="#1e1e2e";
thm_text="#cdd6f4";
thm_rosewater="#f5e0dc";
thm_flamingo="#f2cdcd";
thm_pink="#f5c2e7";
thm_mauve="#cba6f7";
thm_red="#f38ba8";
thm_maroon="#eba0ac";
thm_peach="#fab387";
thm_yellow="#f9e2af";
thm_green="#a6e3a1";
thm_teal="#94e2d5";
thm_sky="#89dceb";
thm_sapphire="#74c7ec";
thm_blue="#89b4fa";
thm_lavender="#b4befe";
thm_subtext_1="#a6adc8";
thm_subtext_0="#bac2de";
thm_overlay_2="#9399b2";
thm_overlay_1="#7f849c";
thm_overlay_0="#6c7086";
thm_surface_2="#585b70";
thm_surface_1="#45475a";
thm_surface_0="#313244";
thm_mantle="#181825";
thm_crust="#11111b";

set-option -g status-justify absolute-centre
set-option -g status-keys vi
set -g status-left-length 150
set -g status-right-length 150
set-option -g status-style fg=$thm_text,bg=$thm_base

#+--- Pane borders ---+
set -g pane-border-style fg=$thm_surface_2
set -g pane-active-border-style fg=$thm_mauve
set -g pane-border-lines "simple"

