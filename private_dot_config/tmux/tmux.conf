#+--- Bars LEFT ---+
RESET="#[fg=$thm_text,bg=$thm_base,nobold,noitalics,nounderscore,nodim]"
# Session name
session_name="#[fg=$thm_mauve,bg=$thm_base,italics,bold,nodim]#{?client_prefix, ´â¥ ,#[dim] ´éû }#[bold,italics,nodim]#S #[fg=$thm_mauve,bg=$thm_base,bold]$LSEP";
dir_section=" #[fg=$thm_blue,bg=$thm_base,italics,dim]#(~/.config/tmux/scripts/find_git_root.py #{pane_current_path})#[fg=$thm_blue,bg=$thm_base,bold]$LSEP";

set -g status-left "$session_name$RESET$dir_section$RESET"

#+--- Windows ---+
# Status
window_number_active="#[bg=$thm_mauve,fg=$thm_base] #(~/.config/tmux/scripts/custom_number.sh #I 'none')"
window_number_inactive="#[bg=$thm_overlay_2,fg=$thm_base] #(~/.config/tmux/scripts/custom_number.sh #I 'none')"
# custom_icon_window_last="¾░û░ ";
# custom_icon_window_current="¾░û» ";
custom_icon_window_zoom="¾░üî ";
custom_icon_window_mark="¾░âÇ ";
custom_icon_window_silent="¾░éø ";
custom_icon_window_activity="¾░û▓ ";
custom_icon_window_bell="¾░é× ";
show_window_status="#{?window_activity_flag,$custom_icon_window_activity,}#{?window_bell_flag,$custom_icon_window_bell,}#{?window_silence_flag,$custom_icon_window_silent,}#{?window_active,$custom_icon_window_current,}#{?window_last_flag,$custom_icon_window_last,}#{?window_marked_flag,$custom_icon_window_mark,}#{?window_zoomed_flag,$custom_icon_window_zoom,}";
show_icon="#(~/.config/tmux/scripts/window_icon.sh #{pane_current_command} #{window_panes})"
# Focus
set -g window-status-current-format "#[fg=$thm_mauve,bg=$thm_base,italics] $show_icon #W $show_window_status"
# Unfocused / attention
set -g window-status-separator "#[fg=$thm_overlay_0,bg=$thm_base]┬À"
set -g window-status-format "#{?window_activity_flag,#[italics],#{?window_bell_flag,#[italics],}}#[fg=#{?window_activity_flag,$thm_red,#{?window_bell_flag,$thm_red,$thm_overlay_2}},bg=$thm_base] $show_icon #W $show_window_status"

#+--- Bars RIGHT ---+
host_name="#[fg=$thm_mauve,bg=$thm_base]¯éÂ#[fg=$thm_base,bg=$thm_mauve,bold,italics] ´îô #H ";
date_section="#[fg=$thm_yellow,bg=$thm_base,bold]$RSEP ´ä│ $RESET#[fg=$thm_yellow,bg=$thm_base]#(date +'%a, %d %b')";
uptime="#[fg=$thm_green,bg=$thm_base,bold]$RSEP ´ê│ $RESET#[fg=$thm_green,bg=$thm_base]#(~/.config/tmux/scripts/uptime_fmt.sh)";

git_status="#(~/.config/tmux/scripts/git_status.sh #{pane_current_path})"
wb_git_status="#(~/.config/tmux/scripts/wb_git_status.sh #{pane_current_path})"

# set -g status-right "$RESET$uptime $RESET$date_section $git_status$wb_git_status"
set -g status-right "$RESET$git_status$wb_git_status"

## Plugins
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'laktak/extrakto'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# prefix+T to toggle Claude Code popup (persistent session per project)
bind -r T run-shell '\
  SESSION="claude-$(echo #{pane_current_path} | md5sum | cut -c1-8)"; \
  tmux has-session -t "$SESSION" 2>/dev/null || \
  tmux new-session -d -s "$SESSION" -c "#{pane_current_path}" "claude --dangerously-skip-permissions"; \
  tmux display-popup -w80% -h80% "tmux attach-session -t $SESSION"'
